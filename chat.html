<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
content="width=device-width,initial-scale=1">

<style>

body{
font-family:Arial;
background:#f3f3f3;
padding:20px;
}

.box{
background:white;
padding:20px;
border-radius:20px;
}

#msgs{
height:400px;
overflow:auto;
margin-bottom:15px;
}

input{
width:100%;
padding:15px;
margin-top:10px;
}

button{
width:100%;
padding:15px;
background:#ff6600;
color:white;
border:none;
margin-top:10px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="box">

<b>CHAT</b>

<div id="msgs"></div>

<input id="msg" placeholder="Message">

<button id="sendBtn">

SEND

</button>

</div>

<script type="module">

import {
initializeApp
}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
onSnapshot
}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig={

apiKey:"AIzaSyBp3K3gJtK2XqIm-eVI1osP-Vma3wj1lTs",

authDomain:"jumiastaff-83757.firebaseapp.com",

projectId:"jumiastaff-83757"

};

const app=initializeApp(firebaseConfig);

const db=getFirestore(app);

const ref=collection(db,"chatMessages");

onSnapshot(ref,s=>{

msgs.innerHTML="";

s.forEach(x=>{

let d=x.data();

msgs.innerHTML+=`

<b>${d.sender}</b>

:

${d.message}

<br><br>

`;

});

});

document.getElementById(

"sendBtn"

).onclick=

async()=>{

if(msg.value=="")return;

await addDoc(

ref,

{

sender:"USER",

message:msg.value,

time:Date.now()

}

);

msg.value="";

};

</script>

</body>

</html>
