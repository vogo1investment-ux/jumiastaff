<!DOCTYPE html>
<html>

<body>

<div id="msgs"></div>

<input id="msg">

<button id="send">

SEND

</button>

<script type="module">

import {
initializeApp
}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getAuth,
onAuthStateChanged
}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
query,
where,
onSnapshot
}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const app=

initializeApp({

apiKey:"AIzaSyBp3K3gJtK2XqIm-eVI1osP-Vma3wj1lTs",

authDomain:"jumiastaff-83757.firebaseapp.com",

projectId:"jumiastaff-83757"

});

const auth=getAuth(app);

const db=getFirestore(app);

onAuthStateChanged(

auth,

user=>{

const q=

query(

collection(

db,

"chatMessages"

),

where(

"userId",

"==",

user.uid

)

);

onSnapshot(

q,

snap=>{

msgs.innerHTML="";

snap.forEach(

x=>{

let d=x.data();

msgs.innerHTML+=`

<b>

${d.sender}

</b>

:

${d.message}

<br>

`;

}

);

}

);

send.onclick=

async()=>{

await addDoc(

collection(

db,

"chatMessages"

),

{

userId:user.uid,

sender:"USER",

message:msg.value,

time:Date.now()

}

);

msg.value="";

};

}

);

</script>

</body>

</html>
