<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>

CHAT

</title>

<style>

body{
background:#f3f3f3;
font-family:Arial;
padding:20px;
font-weight:bold;
}

.box{
background:white;
padding:20px;
border-radius:20px;
font-weight:bold;
}

#msgs{
height:420px;
overflow:auto;
font-weight:bold;
font-size:16px;
}

.chat{
padding:12px;
margin-top:10px;
border-radius:15px;
word-break:break-word;
}

.user{
background:#ffe8d1;
}

.admin{
background:#d8ffe0;
}

input{
width:100%;
padding:15px;
margin-top:10px;
font-weight:bold;
border:none;
border-radius:12px;
background:#f3f3f3;
}

button{
width:100%;
padding:15px;
margin-top:10px;
background:#ff6600;
color:white;
border:none;
font-weight:bold;
border-radius:12px;
}

.top{
background:#ff6600;
padding:20px;
color:white;
border-radius:20px;
margin-bottom:15px;
font-size:20px;
text-align:center;
}

</style>

</head>

<body>

<div class="top">

SELLER CHAT

</div>

<div class="box">

<div id="msgs">

</div>

<input
id="msg"
placeholder="Type Message">

<button id="send">

SEND

</button>

</div>

<script type="module">

import {
initializeApp
}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getAuth,
onAuthStateChanged
}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
query,
where,
onSnapshot
}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const app=

initializeApp({

apiKey:
"AIzaSyBp3K3gJtK2XqIm-eVI1osP-Vma3wj1lTs",

authDomain:
"jumiastaff-83757.firebaseapp.com",

projectId:
"jumiastaff-83757"

});

const auth=
getAuth(app);

const db=
getFirestore(app);

/* SELLER NAME */

const params=

new URLSearchParams(
location.search
);

const seller=

params.get(
"seller"
)||"GENERAL";

/* USER */

onAuthStateChanged(

auth,

user=>{

if(!user){

location=
"auth.html";

return;

}

/* LOAD MESSAGES */

const q=

query(

collection(
db,
"chatMessages"
),

where(
"userId",
"==",
user.uid
),

where(
"seller",
"==",
seller
)

);

onSnapshot(

q,

snap=>{

msgs.innerHTML="";

snap.forEach(

x=>{

let d=
x.data();

msgs.innerHTML+=`

<div class="chat ${d.sender=="USER"?"user":"admin"}">

<b>

${d.sender}

</b>

<br><br>

${d.message}

</div>

`;

}

);

msgs.scrollTop=

msgs.scrollHeight;

}

);

/* SEND MESSAGE */

send.onclick=

async()=>{

if(
msg.value.trim()==""
)return;

await addDoc(

collection(
db,
"chatMessages"
),

{

userId:
user.uid,

seller:
seller,

sender:
"USER",

message:
msg.value,

time:
Date.now()

}

);

msg.value="";

};

}

);

</script>

</body>

</html>
