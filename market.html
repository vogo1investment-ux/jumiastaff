<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>

Market

</title>

<style>

body{
background:#f3f3f3;
font-family:Arial;
padding:15px;
}

.products{

display:grid;

grid-template-columns:

repeat(2,1fr);

gap:15px;

}

.card{

background:white;

border-radius:20px;

overflow:hidden;

font-weight:bold;

}

.card img{

width:100%;

height:180px;

object-fit:cover;

}

.info{

padding:15px;

}

.price{

color:#ff5500;

margin-top:10px;

font-size:20px;

}

button{

width:100%;

padding:12px;

border:none;

background:#ff6600;

color:white;

font-weight:bold;

margin-top:10px;

}

</style>

</head>

<body>

<div class="products">

<div class="card">

<img src="samsungtv.jpg">

<div class="info">

Samsung Smart TV

<div class="price">

$99

</div>

<button
onclick="openProduct(

'TV01',

'Samsung Smart TV',

'75 Inch 8K Smart Television'

)">

VIEW

</button>

</div>

</div>

<script>

function openProduct(

id,

name,

desc

){

location=

`marketView.html?

id=${id}

&name=${name}

&desc=${desc}`;

}

</script>

</body>

</html>
