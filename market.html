<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>

Market

</title>

<style>

body{
background:#f3f3f3;
font-family:Arial;
padding:15px;
}

.card{
background:white;
margin-bottom:20px;
padding:15px;
border-radius:20px;
}

img{
width:100%;
height:220px;
object-fit:cover;
border-radius:20px;
}

.name{
font-weight:bold;
font-size:22px;
margin-top:10px;
}

.price{
font-weight:bold;
font-size:20px;
margin-top:10px;
}

.desc{
font-weight:bold;
margin-top:10px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:15px;
background:#ff6600;
color:white;
margin-top:15px;
font-weight:bold;
}

</style>

</head>

<body>

<div id="market"></div>

<script>

const phone=

"234XXXXXXXXXX";

const products=[

{

id:"CM801",

name:"Gaming Laptop",

price:"$9.50 | ₦15,000",

img:"gamingLaptop.jpg",

desc:"High performance gaming laptop for work gaming and streaming"

},

{

id:"IP15",

name:"iPhone 15 Pro Max",

price:"$12.70 | ₦20,000",

img:"iphone15.jpg",

desc:"Premium smartphone with advanced camera"

},

{

id:"PS900",

name:"PlayStation 5",

price:"$11.43 | ₦18,000",

img:"ps5console.jpg",

desc:"Next generation gaming console"

},

{

id:"TV001",

name:"Samsung Smart TV",

price:"$15.24 | ₦24,000",

img:"smarttv.jpg",

desc:"Smart television with streaming support"

},

{

id:"FR200",

name:"Haier Freezer",

price:"$13.97 | ₦22,000",

img:"freezer.jpg",

desc:"Large freezer with cooling technology"

},

{

id:"MB700",

name:"MacBook Pro",

price:"$19.05 | ₦30,000",

img:"macbookpro.jpg",

desc:"Professional laptop for editing"

},

{

id:"AP500",

name:"AirPods Max",

price:"$7.62 | ₦12,000",

img:"airpodsmax.jpg",

desc:"Wireless premium headphones"

},

{

id:"CC300",

name:"Canon Camera",

price:"$10.16 | ₦16,000",

img:"canoncamera.jpg",

desc:"Professional photography camera"

},

{

id:"DR100",

name:"Drone Pro",

img:"dronepro.jpg",

},

{

id:"GN900",

name:"Generator Set",

price:"$17.78 | ₦28,000",

img:"generator.jpg",

desc:"Power backup generator"

}

];

market.innerHTML=

products.map(

p=>`

<div class="card">

<img src="${p.img}">

<div class="name">

${p.name}

</div>

<div class="price">

${p.price}

</div>

<div class="desc">

${p.desc}

</div>

<button onclick="buy('${p.id}')">

BUY PRODUCT

</button>

</div>

`

).join("");

function buy(id){

window.open(

`https://wa.me/${phone}?text=Hello%20I%20want%20to%20buy%20product%20ID%20${id}`

);

}

</script>

</body>

</html>
