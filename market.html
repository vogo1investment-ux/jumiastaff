<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>

Market

</title>

<style>

body{

background:#f3f3f3;

font-family:Arial;

padding:20px;

}

.card{

background:white;

padding:20px;

border-radius:20px;

}

img{

width:100%;

height:250px;

object-fit:cover;

border-radius:15px;

}

.name{

font-size:24px;

font-weight:bold;

margin-top:15px;

}

.price{

font-size:22px;

font-weight:bold;

margin-top:10px;

color:#ff8800;

}

button{

width:100%;

padding:15px;

margin-top:15px;

background:#ff8800;

color:white;

border:none;

border-radius:12px;

font-size:18px;

}

.popup{

position:fixed;

top:0;

left:0;

right:0;

bottom:0;

background:rgba(
0,0,0,.7
);

display:none;

justify-content:center;

align-items:center;

padding:20px;

}

.box{

background:white;

padding:25px;

border-radius:20px;

text-align:center;

width:100%;

max-width:400px;

}

.msg{

font-size:22px;

font-weight:bold;

margin-bottom:20px;

}

.whatsapp{

background:#25D366;

}

.close{

background:red;

}

</style>

</head>

<body>

<div class="card">

<img src="samsungtv.jpg">

<div class="name">

Samsung Smart TV

</div>

<div class="price">

₦15,000

<br>

$11.32

</div>

<button
onclick="openBuy()">

Buy Product

</button>

</div>

<div
class="popup"

id="pop">

<div class="box">

<div class="msg">

Message this WhatsApp number to receive Product ID before buying

</div>

<div>

+234XXXXXXXXXX

</div>

<button

class="whatsapp"

onclick="goWhatsapp()">

Open WhatsApp

</button>

<button

class="close"

onclick="closeBuy()">

Close

</button>

</div>

</div>

<script>

function openBuy(){

pop.style.display=

"flex";

}

function closeBuy(){

pop.style.display=

"none";

}

function goWhatsapp(){

window.open(

"https://wa.me/234XXXXXXXXXX"

);

}

</script>

</body>

</html>
