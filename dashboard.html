<!DOCTYPE html>
<html>

<body>

<h2>

USER DASHBOARD

</h2>

<div>

Username:

<span id="u">

</span>

</div>

<div>

Available Balance:

$

<span id="a">

2

</span>

</div>

<div>

Withdrawalble Balance:

$

<span id="w">

0

</span>

</div>

<script type="module">

import {
auth,
db
}
from "./firebase.js";

import {
doc,
getDoc
}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

auth.onAuthStateChanged(

async(user)=>{

let s=

await getDoc(

doc(
db,
"users",
user.uid
)

);

let d=s.data();

u.innerHTML=
d.username;

a.innerHTML=
d.availableBalance;

w.innerHTML=
d.withdrawBalance;

}

);

</script>

</body>

</html>
