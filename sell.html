<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>

SELL PRODUCT

</title>

<style>

body{
background:#f3f3f3;
font-family:Arial;
padding:20px;
}

.box{
background:white;
padding:20px;
border-radius:20px;
}

input{

width:100%;

padding:15px;

margin-top:10px;

border-radius:15px;

border:1px solid #ddd;

}

button{

width:100%;

padding:15px;

margin-top:20px;

background:#ff6600;

border:none;

color:white;

font-weight:bold;

border-radius:15px;

}

</style>

</head>

<body>

<div class="box">

<h2>

SELL PRODUCT

</h2>

<input
id="buyer"
placeholder="Buyer Username">

<input
id="pass"
type="password"
placeholder="Password">

<button
onclick="sellProduct()">

SELL PRODUCT

</button>

</div>

<script type="module">

import {

initializeApp

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getAuth,

onAuthStateChanged

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

import {

getFirestore,

collection,

addDoc,

doc,

getDoc,

updateDoc

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig={

apiKey:
"AIzaSyBp3K3gJtK2XqIm-eVI1osP-Vma3wj1lTs",

authDomain:
"jumiastaff-83757.firebaseapp.com",

projectId:
"jumiastaff-83757"

};

const app=
initializeApp(firebaseConfig);

const auth=
getAuth(app);

const db=
getFirestore(app);

let currentUser;

let sellCode=

localStorage.getItem(

"sellProductId"

);

onAuthStateChanged(

auth,

u=>{

currentUser=u;

}

);

window.sellProduct=
async()=>{

await addDoc(

collection(
db,
"sellRequests"
),

{

uid:
currentUser.uid,

buyer:
buyer.value,

productId:
sellCode,

status:
"Pending"

}

);

let s=

await getDoc(

doc(
db,
"users",
currentUser.uid
)

);

let d=
s.data();

let newCart=

(
d.cart||[]
)

.filter(

x=>

x.productId!=sellCode

);

await updateDoc(

doc(
db,
"users",
currentUser.uid
),

{

cart:
newCart

}

);

alert(
"PRODUCT SOLD"
);

location=
"cart.html";

};

</script>

</body>

</html>
