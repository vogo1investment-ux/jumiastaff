<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>

SELL PRODUCT

</title>

<style>

body{
background:#f3f3f3;
font-family:Arial;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:20px;
margin-bottom:15px;
font-weight:bold;
}

input{

width:100%;

padding:15px;

margin-top:10px;

margin-bottom:10px;

font-weight:bold;

}

button{

width:100%;

padding:15px;

background:#ff6600;

color:white;

border:none;

font-weight:bold;

}

</style>

</head>

<body>

<div class="card">

SELL PRODUCT

<br><br>

PRODUCT ID

<input
id="productId"
placeholder="Enter Product ID">

SELL TO USER

<input
id="sellUser"
placeholder="Username">

PASSWORD

<input
id="pass"
type="password"
placeholder="Password">

<button
id="sellBtn">

SELL PRODUCT

</button>

</div>

<script type="module">

import {
initializeApp
}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getAuth,
onAuthStateChanged,
reauthenticateWithCredential,
EmailAuthProvider
}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
doc,
getDoc,
updateDoc
}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const app=

initializeApp({

apiKey:
"AIzaSyBp3K3gJtK2XqIm-eVI1osP-Vma3wj1lTs",

authDomain:
"jumiastaff-83757.firebaseapp.com",

projectId:
"jumiastaff-83757"

});

const auth=

getAuth(app);

const db=

getFirestore(app);

let currentUser=null;

onAuthStateChanged(

auth,

u=>{

if(!u){

location=
"auth.html";

return;

}

currentUser=u;

}

);

sellBtn.onclick=

async()=>{

if(!currentUser){

return;

}

let p=

productId.value;

let s=

sellUser.value;

let pw=

pass.value;

if(

!p||

!s||

!pw

){

alert(

"Fill all fields"

);

return;

}

try{

const credential=

EmailAuthProvider.credential(

currentUser.email,

pw

);

await reauthenticateWithCredential(

currentUser,

credential

);

const ref=

doc(

db,

"users",

currentUser.uid

);

const snap=

await getDoc(ref);

let d=

snap.data();

let cart=

d.cart||[];

cart=

cart.filter(

x=>x!=p

);

await updateDoc(

ref,

{

cart:cart

}

);

await addDoc(

collection(
db,
"pendingSales"
),

{

userId:
currentUser.uid,

productId:p,

sellUser:s,

status:"pending",

time:
Date.now()

}

);

alert(

"PRODUCT SENT FOR APPROVAL"

);

location=
"cart.html";

}

catch{

alert(

"Wrong password"

);

}

};

</script>

</body>

</html>
