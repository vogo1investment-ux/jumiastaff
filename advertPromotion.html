<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>

Advert Promotion

</title>

<style>

#popup{

position:fixed;

top:0;

left:0;

right:0;

bottom:0;

background:
rgba(0,0,0,.8);

display:none;

justify-content:center;

align-items:center;

z-index:9999;

}

.box{

background:white;

padding:15px;

border-radius:20px;

width:90%;

max-width:420px;

position:relative;

}

video{

width:100%;

border-radius:15px;

}

.close{

position:absolute;

top:10px;

right:10px;

background:red;

color:white;

border:none;

padding:8px;

border-radius:50%;

display:none;

}

.title{

font-size:20px;

font-weight:bold;

margin-bottom:10px;

text-align:center;

}

</style>

</head>

<body>

<div id="popup">

<div class="box">

<button
class="close"
id="c"
onclick="hideAd()">

✖

</button>

<div class="title">

ADVERTISEMENT

</div>

<video
id="adVideo"
autoplay
controls>

<source
src="promo1.mp4"
type="video/mp4">

</video>

</div>

</div>

<script>

function showAd(){

popup.style.display=
"flex";

c.style.display=
"none";

setTimeout(

()=>{

c.style.display=
"block";

},

3000

);

}

function hideAd(){

popup.style.display=
"none";

adVideo.pause();

}

setInterval(

showAd,

10000

);

setTimeout(

showAd,

3000

);

</script>

</body>

</html>
