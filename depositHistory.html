<!DOCTYPE html>
<html>

<head>

<style>

body{
background:#f3f3f3;
font-family:Arial;
padding:20px;
}

.card{

background:white;

padding:25px;

border-radius:20px;

margin-top:15px;

}

.status{

font-size:24px;

font-weight:bold;

margin-top:15px;

}

.pending{

color:orange;

}

.approved{

color:green;

}

</style>

</head>

<body>

<h2>

Deposit History

</h2>

<div id="list">

</div>

<script type="module">

import {
initializeApp
}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs
}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const app=
initializeApp({

apiKey:
"AIzaSyBp3K3gJtK2XqIm-eVI1osP-Vma3wj1lTs",

projectId:
"jumiastaff-83757"

});

const db=
getFirestore(app);

const s=
await getDocs(
collection(
db,
"deposits"
)
);

s.forEach(
d=>{

let x=
d.data();

list.innerHTML+=`

<div class="card">

<b>

Method:

</b>

${x.method}

<br><br>

<div class="status ${x.status}">

${x.status}

</div>

</div>

`;

}
);

</script>

</body>

</html>
