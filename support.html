<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>

Customer Service

</title>

<style>

body{

background:#f3f3f3;

font-family:Arial;

padding:20px;

font-weight:bold;

}

.box{

background:white;

padding:20px;

border-radius:20px;

}

#msgs{

height:400px;

overflow:auto;

border:1px solid #ddd;

padding:10px;

margin-top:10px;

}

input{

width:100%;

padding:15px;

margin-top:10px;

font-weight:bold;

}

button{

width:100%;

padding:15px;

margin-top:10px;

background:#ff6600;

color:white;

border:none;

font-weight:bold;

}

.msg{

background:#eee;

padding:10px;

margin-top:10px;

border-radius:10px;

}

</style>

</head>

<body>

<div class="box">

CUSTOMER SERVICE

<div id="msgs">

</div>

<input
id="txt"
placeholder="Message">

<button id="send">

SEND

</button>

</div>

<script type="module">

import {

initializeApp

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getAuth,

onAuthStateChanged

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

import {

getFirestore,

collection,

addDoc,

query,

where,

onSnapshot

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const app=

initializeApp({

apiKey:"AIzaSyBp3K3gJtK2XqIm-eVI1osP-Vma3wj1lTs",

authDomain:"jumiastaff-83757.firebaseapp.com",

projectId:"jumiastaff-83757"

});

const auth=getAuth(app);

const db=getFirestore(app);

onAuthStateChanged(

auth,

user=>{

if(!user)return;

const q=

query(

collection(

db,

"supportMessages"

),

where(

"userId",

"==",

user.uid

)

);

onSnapshot(

q,

snap=>{

msgs.innerHTML="";

snap.forEach(

x=>{

let d=x.data();

msgs.innerHTML+=`

<div class="msg">

${d.sender}

<br><br>

${d.message}

</div>

`;

}

);

}

);

send.onclick=

async()=>{

await addDoc(

collection(

db,

"supportMessages"

),

{

userId:user.uid,

sender:"USER",

message:txt.value,

time:Date.now()

}

);

txt.value="";

};

}

);

</script>

</body>

</html>
