<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
content="width=device-width,initial-scale=1">

<style>

body{

background:#f3f3f3;

font-family:Arial;

padding:20px;

}

.card{

background:white;

padding:20px;

border-radius:20px;

font-weight:bold;

}

input{

width:100%;

padding:15px;

margin-top:10px;

}

button{

width:100%;

padding:15px;

margin-top:10px;

background:#ff6600;

border:none;

color:white;

font-weight:bold;

}

#out{

margin-top:15px;

}

</style>

</head>

<body>

<div class="card">

PRODUCT ID:

<span id="pid">

</span>

<br><br>

NAME:

<div id="pname">

</div>

<br>

DESCRIPTION:

<div id="pdesc">

</div>

<br><br>

AVAILABLE BALANCE:

$

<span id="bal">

0

</span>

<input
id="amount"
placeholder="Amount">

<input
id="pass"

type="password"

placeholder="Password">

<button id="buyBtn">

BUY PRODUCT

</button>

<div id="out">

</div>

</div>

<script type="module">

import {

initializeApp

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getAuth,

onAuthStateChanged

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

import {

getFirestore,

doc,

getDoc,

updateDoc,

arrayUnion

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const app=

initializeApp({

apiKey:

"AIzaSyBp3K3gJtK2XqIm-eVI1osP-Vma3wj1lTs",

authDomain:

"jumiastaff-83757.firebaseapp.com",

projectId:

"jumiastaff-83757"

});

const auth=

getAuth(app);

const db=

getFirestore(app);

let url=

new URLSearchParams(

location.search

);

let id=

url.get("id");

pid.innerHTML=id;

pname.innerHTML=

url.get("name");

pdesc.innerHTML=

url.get("desc");

onAuthStateChanged(

auth,

async(user)=>{

let ref=

doc(

db,

"users",

user.uid

);

let s=

await getDoc(ref);

let d=

s.data();

bal.innerHTML=

d.availableBalance||0;

buyBtn.onclick=

async()=>{

let amt=

Number(

amount.value

);

if(

amt>

d.availableBalance

){

alert(

"LOW BALANCE"

);

return;

}

let newBal=

d.availableBalance-

amt;

await updateDoc(

ref,

{

availableBalance:newBal,

cart:

arrayUnion({

id:id,

name:url.get(

"name"

)

})

}

);

bal.innerHTML=

newBal;

out.innerHTML=

`

PRODUCT BOUGHT

<br><br>

COPY ID:

<b>

${id}

</b>

`;

};

}

);

</script>

</body>

</html>
