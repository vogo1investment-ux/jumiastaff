<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>

JUMIASTAFF ADMIN

</title>

<style>

body{
background:#f3f3f3;
font-family:Arial;
padding:15px;
}

.login,
.panel,
.card{

background:white;

padding:20px;

border-radius:20px;

margin-bottom:15px;

box-shadow:0 3px 10px rgba(0,0,0,.1);

}

h2{
margin-bottom:15px;
}

input{

width:100%;

padding:14px;

margin-top:8px;

margin-bottom:8px;

border-radius:12px;

border:1px solid #ddd;

}

button{

padding:12px;

border:none;

border-radius:12px;

background:#ff6600;

color:white;

font-weight:bold;

margin-top:10px;

width:100%;

}

.row{

display:grid;

grid-template-columns:1fr 1fr;

gap:10px;

}

.title{

font-size:20px;

font-weight:bold;

margin-bottom:10px;

}

.small{

font-size:13px;

color:gray;

}

</style>

</head>

<body>

<div
id="loginBox"
class="login">

<h2>

ADMIN LOGIN

</h2>

<input
id="email"
placeholder="Email">

<input
id="password"
type="password"
placeholder="Password">

<button
onclick="adminLogin()">

LOGIN

</button>

</div>

<div
id="panel"
style="display:none">

<div class="title">

JUMIASTAFF ADMIN PANEL

</div>

<div id="users"></div>

<div class="title">

DEPOSITS

</div>

<div id="deposits"></div>

<div class="title">

WITHDRAWALS

</div>

<div id="withdraws"></div>

</div>

<script type="module">

import {

initializeApp

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getAuth,

signInWithEmailAndPassword,

signOut

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

import {

getFirestore,

collection,

getDocs,

doc,

updateDoc

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig={

apiKey:
"AIzaSyBp3K3gJtK2XqIm-eVI1osP-Vma3wj1lTs",

authDomain:
"jumiastaff-83757.firebaseapp.com",

projectId:
"jumiastaff-83757"

};

const app=
initializeApp(firebaseConfig);

const auth=
getAuth(app);

const db=
getFirestore(app);

window.adminLogin=
async()=>{

await signOut(auth);

let x=

await signInWithEmailAndPassword(

auth,

email.value,

password.value

);

if(

x.user.email
!==
"admin@gmail.com"

){

alert("ADMIN ONLY");

return;

}

loginBox.style.display=
"none";

panel.style.display=
"block";

loadAll();

};

async function loadAll(){

loadUsers();

loadDeposits();

loadWithdraws();

}

async function loadUsers(){

let s=

await getDocs(

collection(
db,
"users"
)

);

users.innerHTML="";

s.forEach(

u=>{

let d=
u.data();

users.innerHTML+=`

<div class="card">

<b>

${d.username||"User"}

</b>

<div class="small">

UID:
${u.id}

</div>

<div class="row">

<div>

Available

<input
id="a${u.id}"
value="${d.availableBalance||0}">

</div>

<div>

Withdrawable

<input
id="w${u.id}"
value="${d.withdrawableBalance||0}">

</div>

</div>

Referral

<input
id="r${u.id}"
value="${d.referralCommission||0}">

Cart

<input
value="${
(d.cart||[])
.join(",")

}">

<button
onclick="saveUser('${u.id}')">

SAVE USER

</button>

</div>

`;

}

);

}

window.saveUser=
async(id)=>{

await updateDoc(

doc(
db,
"users",
id
),

{

availableBalance:

Number(

document.getElementById(

"a"+id

).value

),

withdrawableBalance:

Number(

document.getElementById(

"w"+id

).value

),

referralCommission:

Number(

document.getElementById(

"r"+id

).value

)

}

);

alert("Saved");

};

async function loadDeposits(){

try{

let s=

await getDocs(

collection(
db,
"deposits"
)

);

deposits.innerHTML="";

s.forEach(

x=>{

let d=
x.data();

deposits.innerHTML+=`

<div class="card">

<b>

${d.username}

</b>

<br>

Amount:
${d.amount}

<br>

Status:
${d.status}

</div>

`;

}

);

}catch(e){

deposits.innerHTML=

"No deposits yet";

}

}

async function loadWithdraws(){

try{

let s=

await getDocs(

collection(
db,
"withdraws"
)

);

withdraws.innerHTML="";

s.forEach(

x=>{

let d=
x.data();

withdraws.innerHTML+=`

<div class="card">

<b>

${d.username}

</b>

<br>

Amount:
${d.amount}

<br>

Status:
${d.status}

</div>

`;

}

);

}catch(e){

withdraws.innerHTML=

"No withdrawals yet";

}

}

</script>

</body>

</html>
