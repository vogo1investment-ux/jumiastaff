<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>

JUMIASTAFF ADMIN

</title>

<style>

body{

background:#f3f3f3;

font-family:Arial;

padding:20px;

}

.login,
.panel,
.usercard{

background:white;

padding:20px;

border-radius:20px;

margin-bottom:20px;

}

input{

width:100%;

padding:15px;

margin-top:10px;

border-radius:15px;

border:1px solid #ddd;

}

button{

width:100%;

padding:15px;

margin-top:10px;

border:none;

background:#ff6600;

color:white;

border-radius:15px;

font-weight:bold;

}

</style>

</head>

<body>

<div id="loginBox"
class="login">

<h2>

ADMIN PANEL LOGIN

</h2>

<input
id="email"
placeholder="Admin Email">

<input
id="password"
type="password"
placeholder="Password">

<button
onclick="adminLogin()">

LOGIN

</button>

</div>

<div
id="panel"
style="display:none">

<h2>

JUMIASTAFF ADMIN

</h2>

<div id="users">

</div>

</div>

<script type="module">

import {

initializeApp

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getAuth,

signInWithEmailAndPassword,

signOut

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

import {

getFirestore,

collection,

getDocs,

doc,

updateDoc

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig={

apiKey:
"AIzaSyBp3K3gJtK2XqIm-eVI1osP-Vma3wj1lTs",

authDomain:
"jumiastaff-83757.firebaseapp.com",

projectId:
"jumiastaff-83757",

storageBucket:
"jumiastaff-83757.firebasestorage.app",

messagingSenderId:
"1018307795636",

appId:
"1:1018307795636:web:6e2dc2cbf41cb88e1ad5e1"

};

const app=
initializeApp(firebaseConfig);

const auth=
getAuth(app);

const db=
getFirestore(app);

window.adminLogin=
async()=>{

try{

await signOut(auth);

let x=

await signInWithEmailAndPassword(

auth,

email.value,

password.value

);

if(

x.user.email
!==
"admin@gmail.com"

){

alert(

"ADMIN ONLY"

);

await signOut(auth);

return;

}

loginBox.style.display=
"none";

panel.style.display=
"block";

loadUsers();

}

catch(e){

alert(
e.message
);

}

};

async function loadUsers(){

const s=

await getDocs(

collection(
db,
"users"
)

);

users.innerHTML="";

s.forEach(

d=>{

let x=
d.data();

users.innerHTML+=`

<div class="usercard">

<b>

${x.username||"User"}

</b>

<br><br>

Available Balance

<input
id="a${d.id}"
value="${x.availableBalance||0}">

Withdrawable Balance

<input
id="w${d.id}"
value="${x.withdrawableBalance||0}">

Referral Commission

<input
id="r${d.id}"
value="${x.referralCommission||0}">

<button
onclick="saveUser('${d.id}')">

SAVE USER

</button>

</div>

`;

}

);

}

window.saveUser=
async(id)=>{

await updateDoc(

doc(
db,
"users",
id
),

{

availableBalance:

Number(

document.getElementById(

"a"+id

).value

),

withdrawableBalance:

Number(

document.getElementById(

"w"+id

).value

),

referralCommission:

Number(

document.getElementById(

"r"+id

).value

)

}

);

alert(

"UPDATED"

);

};

</script>

</body>

</html>
