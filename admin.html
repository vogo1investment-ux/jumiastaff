<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>

JUMIASTAFF ADMIN

</title>

<style>

body{
margin:0;
font-family:Arial;
background:#eef2f7;
}

.side{

position:fixed;

left:0;

top:0;

bottom:0;

width:240px;

background:#111827;

color:white;

padding:20px;

}

.menu{

padding:15px;

margin-top:10px;

background:#1f2937;

border-radius:12px;

}

.main{

margin-left:260px;

padding:20px;

}

.stats{

display:grid;

grid-template-columns:
repeat(3,1fr);

gap:15px;

}

.circle{

background:white;

padding:25px;

border-radius:20px;

text-align:center;

box-shadow:0 4px 12px rgba(0,0,0,.1);

}

.num{

font-size:35px;

font-weight:bold;

color:#ff6600;

}

.card{

background:white;

padding:20px;

margin-top:15px;

border-radius:20px;

box-shadow:0 4px 12px rgba(0,0,0,.08);

}

input{

width:100%;

padding:14px;

margin-top:8px;

border-radius:12px;

border:1px solid #ddd;

}

button{

padding:12px;

border:none;

border-radius:12px;

background:#ff6600;

color:white;

margin-top:10px;

width:100%;

}

.delete{

background:red;

}

</style>

</head>

<body>

<div class="side">

<h2>

☰ ADMIN

</h2>

<div class="menu">

📊 Dashboard

</div>

<div class="menu">

👥 Users

</div>

<div class="menu">

💳 Deposits

</div>

<div class="menu">

💸 Withdraws

</div>

<div class="menu">

🛒 Products

</div>

</div>

<div class="main">

<div class="stats">

<div class="circle">

Users

<div
class="num"
id="usersCount">

0

</div>

</div>

<div class="circle">

Online

<div
class="num"
id="onlineCount">

0

</div>

</div>

<div class="circle">

Active

<div
class="num"
id="activeCount">

0

</div>

</div>

</div>

<div class="card">

<h3>

USER CONTROL

</h3>

<input
placeholder="Search Username">

</div>

<div
id="users">

</div>

<div class="card">

<h3>

DEPOSITS

</h3>

<div
id="deposits">

</div>

</div>

<div class="card">

<h3>

WITHDRAWALS

</h3>

<div
id="withdraws">

</div>

</div>

</div>

</body>

</html>
