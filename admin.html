<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>

ADMIN PANEL

</title>

<style>

body{
background:#f3f3f3;
font-family:Arial;
padding:15px;
}

.top{
background:#ff6600;
color:white;
padding:20px;
border-radius:20px;
margin-bottom:20px;
}

.card{
background:white;
padding:20px;
border-radius:20px;
margin-bottom:15px;
}

input{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:8px;
}

button{
width:100%;
padding:12px;
background:#ff6600;
border:none;
color:white;
}

</style>

</head>

<body>

<div class="top">

ADMIN PANEL

</div>

<div id="users">

</div>

<script type="module">

import {

initializeApp

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getFirestore,

collection,

getDocs,

doc,

updateDoc

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig={

apiKey:"AIzaSyBp3K3gJtK2XqIm-eVI1osP-Vma3wj1lTs",

authDomain:
"jumiastaff-83757.firebaseapp.com",

projectId:
"jumiastaff-83757"

};

const app=

initializeApp(

firebaseConfig

);

const db=

getFirestore(

app

);

let s=

await getDocs(

collection(

db,

"users"

)

);

s.forEach(

x=>{

let d=x.data();

users.innerHTML+=`

<div class="card">

<b>

${d.username}

</b>

<input
id="a${x.id}"
value="${d.availableBalance||0}">

<input
id="w${x.id}"
value="${d.withdrawableBalance||0}">

<input
id="r${x.id}"
value="${d.referralCommission||0}">

<button
onclick="saveUser('${x.id}')">

SAVE

</button>

</div>

`;

}

);

window.saveUser=

async(id)=>{

await updateDoc(

doc(

db,

"users",

id

),

{

availableBalance:

Number(

document.getElementById(

"a"+id

).value

),

withdrawableBalance:

Number(

document.getElementById(

"w"+id

).value

),

referralCommission:

Number(

document.getElementById(

"r"+id

).value

)

}

);

alert(

"Updated"

);

};

</script>

</body>

</html>
