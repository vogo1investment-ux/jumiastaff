<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>

ADMIN PANEL

</title>

<style>

body{
background:#f3f3f3;
font-family:Arial;
padding:20px;
}

.box,
.usercard{

background:white;

padding:20px;

border-radius:20px;

margin-bottom:20px;

}

input{

width:100%;

padding:15px;

margin-top:10px;

border-radius:15px;

border:1px solid #ddd;

}

button{

width:100%;

padding:15px;

margin-top:10px;

background:#ff6600;

color:white;

border:none;

border-radius:15px;

font-weight:bold;

}

</style>

</head>

<body>

<div id="loginBox"
class="box">

<h2>

ADMIN LOGIN

</h2>

<input
id="email"
placeholder="Email">

<input
id="password"
type="password"
placeholder="Password">

<button
onclick="adminLogin()">

LOGIN

</button>

</div>

<div id="panel"
style="display:none">

<h2>

ADMIN PANEL

</h2>

<div id="users">

</div>

</div>

<script type="module">

import {

initializeApp

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getAuth,

signInWithEmailAndPassword

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

import {

getFirestore,

collection,

getDocs,

doc,

updateDoc

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig={

apiKey:
"AIzaSyBp3K3gJtK2XqIm-eVI1osP-Vma3wj1lTs",

authDomain:
"jumiastaff-83757.firebaseapp.com",

projectId:
"jumiastaff-83757"

};

const app=
initializeApp(firebaseConfig);

const auth=
getAuth(app);

const db=
getFirestore(app);

window.adminLogin=
async()=>{

try{

await signInWithEmailAndPassword(

auth,

email.value,

password.value

);

if(

email.value!

=="admin@gmail.com"

){

alert(

"Not admin"

);

return;

}

loginBox.style.display=
"none";

panel.style.display=
"block";

loadUsers();

}

catch(e){

alert(

e.message

);

}

};

async function loadUsers(){

let s=

await getDocs(

collection(
db,
"users"
)

);

users.innerHTML="";

s.forEach(

x=>{

let d=
x.data();

users.innerHTML+=`

<div class="usercard">

<b>

${d.username}

</b>

<br><br>

Available Balance

<input
id="a${x.id}"
value="${d.availableBalance||0}">

Withdrawable Balance

<input
id="w${x.id}"
value="${d.withdrawableBalance||0}">

Referral Commission

<input
id="r${x.id}"
value="${d.referralCommission||0}">

<button
onclick="saveUser('${x.id}')">

SAVE

</button>

</div>

`;

}

);

}

window.saveUser=
async(id)=>{

await updateDoc(

doc(
db,
"users",
id
),

{

availableBalance:

Number(

document.getElementById(

"a"+id

).value

),

withdrawableBalance:

Number(

document.getElementById(

"w"+id

).value

),

referralCommission:

Number(

document.getElementById(

"r"+id

).value

)

}

);

alert(
"Updated"
);

};

</script>

</body>

</html>
