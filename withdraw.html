<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
content="width=device-width,initial-scale=1">

<style>

body{
font-family:Arial;
background:#f3f3f3;
padding:20px;
}

.box{
background:white;
padding:20px;
border-radius:20px;
margin-top:15px;
}

input,select{

width:100%;

padding:15px;

margin-top:10px;

border-radius:10px;

border:1px solid #ddd;

}

button{

width:100%;

padding:15px;

margin-top:15px;

background:#ff8800;

border:none;

color:white;

border-radius:10px;

}

.hide{
display:none;
}

</style>

</head>

<body>

<div class="box">

<select id="method">

<option>

CashApp

</option>

<option>

PayPal

</option>

<option>

Gift Card

</option>

<option>

Bank Transfer

</option>

</select>

<div id="emailPart">

<input
id="email"
placeholder="Email Address">

</div>

<div
id="bankPart"
class="hide">

<input
id="bank"
placeholder="Bank Name">

<input
id="acc"
placeholder="Account Number">

<input
id="holder"
placeholder="Account Holder Name">

</div>

<input
id="amount"
placeholder="Amount">

<button
onclick="send()">

SUBMIT

</button>

</div>

<script type="module">

import {

initializeApp

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getFirestore,

collection,

addDoc

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

import {

getAuth

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

const firebaseConfig={

apiKey:"AIzaSyBp3K3gJtK2XqIm-eVI1osP-Vma3wj1lTs",

authDomain:"jumiastaff-83757.firebaseapp.com",

projectId:"jumiastaff-83757"

};

const app=
initializeApp(firebaseConfig);

const db=
getFirestore(app);

const auth=
getAuth(app);

method.onchange=()=>{

if(method.value=="Bank Transfer"){

bankPart.classList.remove("hide");

emailPart.classList.add("hide");

}

else{

emailPart.classList.remove("hide");

bankPart.classList.add("hide");

}

};

window.send=async()=>{

await addDoc(

collection(
db,
"withdrawals"
),

{

uid:

auth.currentUser.uid,

method:

method.value,

email:

email.value,

bank:

bank.value,

account:

acc.value,

holder:

holder.value,

amount:

amount.value,

status:

"pending"

}

);

alert(

"Withdrawal submitted"

);

};

</script>

</body>

</html>
