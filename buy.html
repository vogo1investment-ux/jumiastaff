<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>

Buy Product

</title>

</head>

<body>

<input
id="pid"
placeholder="Enter Product Code">

<br><br>

<button onclick="buy()">

BUY

</button>

<script type="module">

import {

initializeApp

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getAuth,

onAuthStateChanged

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

import {

getFirestore,

doc,

updateDoc,

arrayUnion

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig={

apiKey:

"AIzaSyBp3K3gJtK2XqIm-eVI1osP-Vma3wj1lTs",

authDomain:

"jumiastaff-83757.firebaseapp.com",

projectId:

"jumiastaff-83757"

};

const app=

initializeApp(firebaseConfig);

const auth=

getAuth(app);

const db=

getFirestore(app);

let currentUser=null;

onAuthStateChanged(

auth,

u=>{

currentUser=u;

}

);

window.buy=

async()=>{

let code=

pid.value.toUpperCase();

if(!currentUser)return;

await updateDoc(

doc(

db,

"users",

currentUser.uid

),

{

cart:

arrayUnion({

productId:code

})

}

);

alert(

"Product added to cart"

);

location=

"cart.html";

};

</script>

</body>

</html>
