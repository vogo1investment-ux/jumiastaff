<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>

Buy Product

</title>

<style>

body{

font-family:Arial;

background:#f3f3f3;

padding:20px;

}

.box{

background:white;

padding:20px;

border-radius:20px;

margin-top:20px;

}

input{

width:100%;

padding:15px;

border-radius:15px;

border:1px solid #ccc;

margin-top:15px;

}

button{

width:100%;

padding:18px;

margin-top:20px;

border:none;

border-radius:15px;

background:#ff6600;

color:white;

font-size:18px;

}

</style>

</head>

<body>

<div class="box">

<h2>

Buy Product

</h2>

<br>

Product ID

<input

id="productid"

placeholder="Enter Product ID">

<br>

Password

<input

id="password"

type="password"

placeholder="Password">

<button

onclick="submitBuy()">

Submit

</button>

</div>

<script type="module">

import {

initializeApp

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getAuth,

onAuthStateChanged

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

import {

getFirestore,

doc,

updateDoc,

arrayUnion

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig={

apiKey:
"AIzaSyBp3K3gJtK2XqIm-eVI1osP-Vma3wj1lTs",

authDomain:
"jumiastaff-83757.firebaseapp.com",

projectId:
"jumiastaff-83757"

};

const app=

initializeApp(firebaseConfig);

const auth=

getAuth(app);

const db=

getFirestore(app);

let currentUser=null;

onAuthStateChanged(

auth,

u=>{

currentUser=u;

}

);

window.submitBuy=

async()=>{

if(!currentUser){

alert(
"Login First"
);

return;

}

let id=

productid.value;

await updateDoc(

doc(
db,
"users",
currentUser.uid
),

{

cart:

arrayUnion(

{

productId:id,

name:id

}

)

}

);

alert(
"Product Added To Cart"
);

location=
"cart.html";

};

</script>

</body>

</html>
