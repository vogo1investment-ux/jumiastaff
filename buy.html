<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>

Buy Product

</title>

<style>

body{

background:#f3f3f3;

font-family:Arial;

padding:20px;

}

.box{

background:white;

padding:25px;

border-radius:20px;

margin-top:20px;

}

.title{

font-size:25px;

font-weight:bold;

margin-bottom:15px;

color:#ff8800;

}

input{

width:100%;

padding:15px;

margin-top:15px;

border-radius:12px;

border:1px solid #ddd;

}

button{

width:100%;

padding:15px;

margin-top:20px;

border:none;

background:#ff8800;

color:white;

font-size:18px;

border-radius:12px;

}

.big{

font-size:22px;

font-weight:bold;

margin-top:15px;

}

</style>

</head>

<body>

<div class="box">

<div class="title">

BUY PRODUCT

</div>

<div class="big">

Available Balance Only

</div>

<div class="big">

Use only your available balance to buy products.

</div>

<input
id="pid"

placeholder="Enter Product ID">

<input
id="pass"

type="password"

placeholder="Enter Password">

<button
onclick="submitBuy()">

Submit Purchase

</button>

<div
id="msg">

</div>

</div>

<script type="module">

import {

initializeApp

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getFirestore,

collection,

addDoc

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

import {

getAuth

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

const firebaseConfig={

apiKey:

"AIzaSyBp3K3gJtK2XqIm-eVI1osP-Vma3wj1lTs",

authDomain:

"jumiastaff-83757.firebaseapp.com",

projectId:

"jumiastaff-83757",

storageBucket:

"jumiastaff-83757.firebasestorage.app",

messagingSenderId:

"1018307795636",

appId:

"1:1018307795636:web:6e2dc2cbf41cb88e1ad5e1"

};

const app=

initializeApp(firebaseConfig);

const db=

getFirestore(app);

const auth=

getAuth(app);

window.submitBuy=
async()=>{

if(!auth.currentUser){

alert(
"Login first"
);

return;

}

await addDoc(

collection(
db,
"buyRequests"
),

{

uid:

auth.currentUser.uid,

productID:

pid.value,

status:

"pending",

time:

Date.now()

}

);

msg.innerHTML=

"<b style='color:orange'>Pending Approval</b>";

pid.value="";

pass.value="";

};

</script>

</body>

</html>
