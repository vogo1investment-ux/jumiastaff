<!DOCTYPE html>
<html>

<body>

<div style="
background:#ff9900;
padding:25px;
color:white">

Welcome,

<span id="user">

User

</span>

<br>

<span id="mail">

Email

</span>

</div>

<div style="
background:white;
margin:20px;
padding:20px">

Withdrawalble balance

$

<span id="w">

0

</span>

<br><br>

Available balance

$

<span id="a">

2

</span>

</div>

<button
onclick="location='dashboard.html'">

OPEN DASHBOARD

</button>

<script type="module">

import {
auth,
db
}
from "./firebase.js";

import {
doc,
getDoc
}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

auth.onAuthStateChanged(

async(u)=>{

if(!u){

location=
"auth.html";

return;

}

let s=

await getDoc(

doc(
db,
"users",
u.uid
)

);

let d=s.data();

user.innerHTML=
d.username;

mail.innerHTML=
d.email;

a.innerHTML=
d.availableBalance;

w.innerHTML=
d.withdrawBalance;

}

);

</script>

</body>

</html>
