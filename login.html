<!DOCTYPE html>
<html>

<body>

<input id="email">

<input
id="password"
type="password">

<button
onclick="login()">

Login

</button>

<script type="module">

import {auth}

from "./firebase.js";

import {

signInWithEmailAndPassword

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

window.login=
async()=>{

await signInWithEmailAndPassword(

auth,

email.value,

password.value

);

location=

"dashboard.html";

}

</script>

</body>

</html>
