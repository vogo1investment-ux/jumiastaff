<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>

Register

</title>

<style>

body{

background:#f5f5f5;

font-family:Arial;

padding:30px;

}

.box{

background:white;

padding:20px;

border-radius:20px;

margin-top:100px;

}

input{

width:100%;

padding:18px;

margin-top:15px;

border-radius:40px;

border:2px solid #eee;

}

button{

width:100%;

padding:18px;

margin-top:20px;

border:none;

border-radius:40px;

background:

linear-gradient(
90deg,
#ff7755,
red
);

color:white;

font-size:20px;

}

</style>

</head>

<body>

<div class="box">

<input
id="username"
placeholder="Username">

<input
id="email"
placeholder="Email">

<input
id="password"
type="password"
placeholder="Password">

<button onclick="reg()">

Register

</button>

</div>

<script type="module">

import {auth,db}

from "./firebase.js";

import {

createUserWithEmailAndPassword

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

import {

doc,
setDoc

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

window.reg=async()=>{

let email=
email.value;

let pass=
password.value;

let user=
await

createUserWithEmailAndPassword(
auth,
email,
pass
);

await setDoc(

doc(
db,
"users",
user.user.uid
),

{

username:

username.value,

email:

email,

availableBalance:2,

withdrawBalance:0

}

);

location=
"dashboard.html";

}

</script>

</body>

</html>
