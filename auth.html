<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>JUMIASTAFF Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f5f5f5;
min-height:100vh;
}

.top{

height:80px;

background:white;

display:flex;

align-items:center;

justify-content:space-between;

padding:0 20px;

box-shadow:0 2px 10px rgba(0,0,0,.08);

}

.left{

display:flex;

gap:20px;

font-size:35px;

}

.right{

font-size:35px;

}

.wrap{

padding:40px;

max-width:650px;

margin:auto;

}

.note{

text-align:center;

color:#666;

margin:50px 0;

font-size:18px;

}

.box{

background:#f7f7f7;

border:2px solid #e5e5e5;

border-radius:50px;

padding:18px;

display:flex;

align-items:center;

margin-bottom:25px;

}

.box input{

border:none;

outline:none;

background:none;

width:100%;

font-size:20px;

padding-left:15px;

}

.btn{

width:100%;

border:none;

padding:22px;

border-radius:50px;

background:

linear-gradient(
90deg,
#ff704d,
#ff0040
);

color:white;

font-size:24px;

margin-top:20px;

}

.bottom{

margin-top:60px;

text-align:center;

font-size:20px;

}

.bottom span{

text-decoration:underline;

font-weight:bold;

}

#register{

display:none;

}

</style>

</head>

<body>

<div class="top">

<div class="left">

← 🌐

</div>

<div class="right">

🎧

</div>

</div>

<div class="wrap">

<div id="login">

<div class="note">

Genuine products are guaranteed at low prices

</div>

<div class="box">

📞

<input
id="loginPhone"
placeholder="Please Enter Mobile Phone Number">

</div>

<div class="box">

🔒

<input
type="password"
id="loginPass"
placeholder="Password Length 6~30">

👁

</div>

<button
class="btn"
onclick="login()">

Login

</button>

<div class="bottom">

No Account?

<span onclick="showRegister()">

Register Now

</span>

</div>

</div>

<div id="register">

<div class="box">

📞

<input
id="regPhone"
placeholder="Please Enter Mobile Phone Number">

</div>

<div class="box">

🔒

<input
type="password"
id="regPass"
placeholder="Password Length 6~30">

👁

</div>

<div class="box">

🔒

<input
type="password"
id="confirmPass"
placeholder="Please Enter Confirm Password">

👁

</div>

<div class="box">

🔗

<input
id="ref"
placeholder="Please Enter Invitation Code">

</div>

<button
class="btn"
onclick="register()">

Register

</button>

<div class="bottom">

Existing Account?

<span onclick="showLogin()">

Log In Now

</span>

</div>

</div>

</div>

<script type="module">

import{
initializeApp
}

from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import{
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword
}

from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

import{
getFirestore,
doc,
setDoc
}

from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig={

apiKey:
"YOURKEY",

authDomain:
"YOURDOMAIN",

projectId:
"YOURPROJECT"

};

const app=
initializeApp(firebaseConfig);

const auth=
getAuth(app);

const db=
getFirestore(app);

window.showRegister=()=>{

login.style.display="none";

register.style.display="block";

}

window.showLogin=()=>{

register.style.display="none";

login.style.display="block";

}

window.register=
async()=>{

let p=
regPhone.value;

let pass=
regPass.value;

let r=
ref.value;

let mail=
p+"@jumiastaff.com";

let u=
await createUserWithEmailAndPassword(

auth,
mail,
pass

);

await setDoc(

doc(
db,
"users",
u.user.uid
),

{

username:p,

usedReferral:r,

availableBalance:2,

withdrawableBalance:0,

referralCommission:0

}

);

location=
"dashboard.html";

}

window.login=
async()=>{

let mail=

loginPhone.value+

"@jumiastaff.com";

await signInWithEmailAndPassword(

auth,

mail,

loginPass.value

);

location=
"dashboard.html";

}

</script>

</body>

</html>
