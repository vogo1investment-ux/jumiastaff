<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>

JUMIASTAFF Auth

</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f5f5f5;
min-height:100vh;
}

.wrap{

max-width:500px;

margin:auto;

padding:25px;

padding-top:60px;

}

.box{

background:#fafafa;

border:2px solid #e5e5e5;

border-radius:50px;

padding:18px;

margin-bottom:20px;

display:flex;

align-items:center;

gap:15px;

}

.box input{

border:none;

background:none;

outline:none;

width:100%;

font-size:18px;

}

.btn{

width:100%;

border:none;

padding:20px;

border-radius:50px;

font-size:22px;

color:white;

background:

linear-gradient(
90deg,
#ff7a7a,
#ff0033
);

}

.bottom{

text-align:center;

margin-top:35px;

font-size:20px;

}

.bottom span{

font-weight:bold;

text-decoration:underline;

}

#register{

display:none;

}

.note{

text-align:center;

margin-bottom:30px;

}

</style>

</head>

<body>

<div class="wrap">

<div id="loginPage">

<div class="note">

Login To Continue

</div>

<div class="box">

📧

<input
id="loginEmail"

placeholder=
"Email">

</div>

<div class="box">

🔒

<input
id="loginPass"

type="password"

placeholder=
"Password">

</div>

<button
class="btn"

onclick="loginUser()">

LOGIN

</button>

<div class="bottom">

No Account?

<span onclick="openRegister()">

Register Now

</span>

</div>

</div>

<div id="register">

<div class="note">

Create Account

</div>

<div class="box">

👤

<input
id="username"

placeholder=
"Username">

</div>

<div class="box">

📧

<input
id="email"

placeholder=
"Email">

</div>

<div class="box">

🔒

<input
id="pass"

type="password"

placeholder=
"Password">

</div>

<div class="box">

🔒

<input
id="confirm"

type="password"

placeholder=
"Confirm Password">

</div>

<div class="box">

🔗

<input
id="referral"

placeholder=
"Referral Code">

</div>

<button
class="btn"

onclick="registerUser()">

REGISTER

</button>

<div class="bottom">

Existing Account?

<span onclick="openLogin()">

Login Now

</span>

</div>

</div>

</div>

<script type="module">

import{
initializeApp
}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import{
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword
}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

import{
getFirestore,
doc,
setDoc
}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig={

apiKey:
"AIzaSyBp3K3gJtK2XqIm-eVI1osP-Vma3wj1lTs",

authDomain:
"jumiastaff-83757.firebaseapp.com",

projectId:
"jumiastaff-83757",

storageBucket:
"jumiastaff-83757.firebasestorage.app",

messagingSenderId:
"1018307795636",

appId:
"1:1018307795636:web:6e2dc2cbf41cb88e1ad5e1",

measurementId:
"G-KJM4KLH6ZJ"

};

const app=
initializeApp(firebaseConfig);

const auth=
getAuth(app);

const db=
getFirestore(app);

window.openRegister=()=>{

loginPage.style.display=
"none";

register.style.display=
"block";

}

window.openLogin=()=>{

register.style.display=
"none";

loginPage.style.display=
"block";

}

window.registerUser=
async()=>{

if(

pass.value

!==

confirm.value

){

alert(
"Password mismatch"
);

return;

}

try{

let user=

await createUserWithEmailAndPassword(

auth,

email.value,

pass.value

);

await setDoc(

doc(
db,
"users",
user.user.uid
),

{

username:
username.value,

email:
email.value,

usedReferral:
referral.value,

availableBalance:2,

withdrawableBalance:0,

referralCommission:0,

joinedUsers:0,

cart:[],

taskCompleted:false

}

);

location=
"dashboard.html";

}

catch(e){

alert(
e.message
);

}

}

window.loginUser=
async()=>{

try{

await signInWithEmailAndPassword(

auth,

loginEmail.value,

loginPass.value

);

location=
"dashboard.html";

}

catch(e){

alert(
e.message
);

}

}

</script>

</body>

</html>
