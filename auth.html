<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>

JUMIASTAFF

</title>

<style>

body{

margin:0;

font-family:Arial;

background:#f3f3f3;

padding:20px;

}

.box{

background:white;

padding:25px;

border-radius:20px;

margin-top:40px;

}

.title{

font-size:28px;

font-weight:bold;

margin-bottom:20px;

}

input{

width:100%;

padding:15px;

margin-top:12px;

border:1px solid #ddd;

border-radius:12px;

box-sizing:border-box;

}

button{

width:100%;

padding:15px;

margin-top:15px;

border:none;

background:#ff9900;

color:white;

font-size:18px;

border-radius:12px;

}

.link{

text-align:center;

margin-top:15px;

}

</style>

</head>

<body>

<div class="box">

<div class="title">

Login / Sign Up

</div>

<input
id="username"

placeholder="Username">

<input
id="phone"

placeholder="Phone Number">

<input
id="password"

type="password"

placeholder="Password">

<input
id="ref"

placeholder="Referral Code (Optional)">

<button
onclick="signup()">

SIGN UP

</button>

<button
onclick="login()">

LOGIN

</button>

</div>

<script type="module">

import {

initializeApp

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getAuth,

createUserWithEmailAndPassword,

signInWithEmailAndPassword

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

import {

getFirestore,

setDoc,

doc

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig={

apiKey:
"AIzaSyBp3K3gJtK2XqIm-eVI1osP-Vma3wj1lTs",

authDomain:
"jumiastaff-83757.firebaseapp.com",

projectId:
"jumiastaff-83757"

};

const app=
initializeApp(firebaseConfig);

const auth=
getAuth(app);

const db=
getFirestore(app);

window.signup=
async()=>{

let u=
username.value;

let p=
phone.value;

let pass=
password.value;

let referral=
ref.value;

let email=
p+"@jumiastaff.com";

let user=

await createUserWithEmailAndPassword(

auth,

email,

pass

);

await setDoc(

doc(
db,
"users",
user.user.uid
),

{

username:u,

phone:p,

referralCode:u,

usedReferral:referral,

availableBalance:2,

withdrawableBalance:0,

referralCommission:0,

joinedUsers:0

}

);

location=
"dashboard.html";

};

window.login=
async()=>{

let email=

phone.value+

"@jumiastaff.com";

await signInWithEmailAndPassword(

auth,

email,

password.value

);

location=
"dashboard.html";

};

</script>

</body>

</html>
