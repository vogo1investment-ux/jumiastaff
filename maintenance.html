<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>

Access Denied

</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{

background:
linear-gradient(
135deg,
#111,
#222
);

height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

color:white;

}

.box{

background:
rgba(255,255,255,.05);

backdrop-filter:blur(10px);

padding:40px;

border-radius:25px;

text-align:center;

width:100%;

max-width:420px;

box-shadow:
0 0 30px rgba(0,0,0,.5);

animation:pop .5s ease;

}

@keyframes pop{

from{

transform:scale(.7);
opacity:0;

}

to{

transform:scale(1);
opacity:1;

}

}

.icon{

font-size:70px;

margin-bottom:20px;

animation:shake 1s infinite;

}

@keyframes shake{

0%{transform:rotate(0deg);}
25%{transform:rotate(5deg);}
50%{transform:rotate(0deg);}
75%{transform:rotate(-5deg);}
100%{transform:rotate(0deg);}

}

h1{

font-size:35px;

margin-bottom:15px;

color:#ff4444;

}

p{

font-size:18px;

line-height:30px;

opacity:.9;

}

.loader{

margin:25px auto 0;

width:60px;

height:60px;

border:6px solid #444;

border-top:6px solid #ff6600;

border-radius:50%;

animation:spin 1s linear infinite;

}

@keyframes spin{

100%{

transform:rotate(360deg);

}

}

</style>

</head>

<body>

<div class="box">

<div class="icon">

😕

</div>

<h1>

ACCESS DENIED

</h1>

<p>

Opps something went wrong.<br>

Please wait while we work on it...

</p>

<div class="loader">

</div>

</div>

</body>

</html>
