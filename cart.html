<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>

My Cart

</title>

<style>

body{

margin:0;

background:#f3f3f3;

font-family:Arial;

padding:20px;

}

.top{

background:white;

padding:18px;

border-radius:20px;

font-size:24px;

font-weight:bold;

box-shadow:
0 5px 10px rgba(
0,0,0,.1
);

margin-bottom:20px;

}

.card{

background:white;

padding:15px;

border-radius:20px;

margin-bottom:20px;

box-shadow:
0 5px 10px rgba(
0,0,0,.1
);

}

.card img{

width:100%;

height:220px;

object-fit:cover;

border-radius:15px;

}

.name{

font-size:22px;

font-weight:bold;

margin-top:15px;

}

.id{

margin-top:10px;

font-size:18px;

font-weight:bold;

color:#ff8800;

}

.empty{

text-align:center;

font-size:22px;

margin-top:100px;

font-weight:bold;

}

.copy{

margin-top:15px;

width:100%;

padding:14px;

background:#ff8800;

border:none;

color:white;

border-radius:12px;

font-size:18px;

}

</style>

</head>

<body>

<div class="top">

🛒 MY CART

</div>

<div id="list">

<div class="empty">

No Product Yet

</div>

</div>

<script type="module">

import {

initializeApp

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getFirestore,

collection,

query,

where,

getDocs

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

import {

getAuth,

onAuthStateChanged

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

const firebaseConfig={

apiKey:
"AIzaSyBp3K3gJtK2XqIm-eVI1osP-Vma3wj1lTs",

authDomain:
"jumiastaff-83757.firebaseapp.com",

projectId:
"jumiastaff-83757"

};

const app=
initializeApp(
firebaseConfig
);

const db=
getFirestore(
app
);

const auth=
getAuth(
app
);

const products={

"samsungtv.jpg":{

name:
"Samsung Smart TV"

},

"ecoflow.jpg":{

name:
"EcoFlow Power Station"

},

"HaierThermocoolChestFreezer.jpg":{

name:
"Haier Thermocool Freezer"

},

"AppleMacBookAirM4.jpg":{

name:
"Apple MacBook Air"

},

"RTXGamingLaptop.jpg":{

name:
"RTX Gaming Laptop"

},

"dsw.jpg":{

name:
"Designer Smart Watch"

}

};

onAuthStateChanged(

auth,

async user=>{

if(!user){

location.href=

"index.html";

return;

}

let q=

query(

collection(
db,
"buyRequests"
),

where(
"uid",
"==",
user.uid
),

where(
"status",
"==",
"Approved"
)

);

let snap=

await getDocs(
q
);

list.innerHTML="";

if(

snap.empty

){

list.innerHTML=

`

<div class="empty">

No Product Yet

</div>

`;

return;

}

snap.forEach(doc=>{

let d=
doc.data();

let img=

d.productID;

let pname=

products[img]?

products[img].name

:

img;

list.innerHTML+=`

<div class="card">

<img src="${img}">

<div class="name">

${pname}

</div>

<div class="id">

Product ID:

${img}

</div>

<button

class="copy"

onclick=

"copyID('${img}')"

>

Copy Product ID

</button>

</div>

`;

});

}

);

window.copyID=

function(x){

navigator.clipboard.writeText(
x
);

alert(

"Copied: "+x

);

};

</script>

</body>

</html>
