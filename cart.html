<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>

CART

</title>

<style>

body{
background:#f3f3f3;
font-family:Arial;
padding:20px;
}

.card{

background:white;

padding:20px;

margin-bottom:20px;

border-radius:20px;

}

img{

width:100%;

height:220px;

object-fit:cover;

border-radius:15px;

}

button{

width:100%;

padding:15px;

margin-top:15px;

background:red;

border:none;

color:white;

border-radius:15px;

font-weight:bold;

}

</style>

</head>

<body>

<h2>

MY CART

</h2>

<div id="cart">

</div>

<script type="module">

import products

from "./products.js";

import {

initializeApp

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getAuth,

onAuthStateChanged

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

import {

getFirestore,

doc,

getDoc

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig={

apiKey:
"AIzaSyBp3K3gJtK2XqIm-eVI1osP-Vma3wj1lTs",

authDomain:
"jumiastaff-83757.firebaseapp.com",

projectId:
"jumiastaff-83757"

};

const app=
initializeApp(firebaseConfig);

const auth=
getAuth(app);

const db=
getFirestore(app);

window.sellNow=
(id)=>{

localStorage.setItem(

"sellProductId",

id

);

location=
"sell.html";

};

onAuthStateChanged(

auth,

async(user)=>{

let snap=

await getDoc(

doc(
db,
"users",
user.uid
)

);

let d=
snap.data();

cart.innerHTML="";

(

d.cart||[]

)

.forEach(

x=>{

let p=

products[
x.productId
];

if(!p)return;

cart.innerHTML+=`

<div class="card">

<img src="${p.img}">

<h2>

${p.name}

</h2>

<b>

${x.productId}

</b>

<button
onclick="sellNow('${x.productId}')">

SELL PRODUCT

</button>

</div>

`;

}

);

}

);

</script>

</body>

</html>
