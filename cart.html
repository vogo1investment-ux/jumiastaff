<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>

My Cart

</title>

<style>

body{

background:#f3f3f3;

font-family:Arial;

padding:20px;

}

.card{

background:white;

padding:20px;

border-radius:20px;

margin-top:20px;

}

img{

width:100%;

height:220px;

object-fit:cover;

border-radius:15px;

}

.name{

font-size:24px;

font-weight:bold;

margin-top:15px;

}

.id{

font-size:20px;

font-weight:bold;

margin-top:10px;

color:#ff8800;

}

button{

width:100%;

padding:15px;

margin-top:15px;

background:#ff8800;

border:none;

color:white;

border-radius:10px;

}

</style>

</head>

<body>

<h1>

My Cart

</h1>

<div id="list">

</div>

<script type="module">

import {

initializeApp

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getFirestore,

collection,

query,

where,

getDocs

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

import {

getAuth

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

const app=

initializeApp({

apiKey:

"AIzaSyBp3K3gJtK2XqIm-eVI1osP-Vma3wj1lTs",

projectId:

"jumiastaff-83757"

});

const db=
getFirestore(app);

const auth=
getAuth(app);

const auto={

"samsungtv.jpg":{

name:

"Samsung Smart TV",

id:

"TV1001"

},

"ecoflow.jpg":{

name:

"EcoFlow Power Station",

id:

"ECO2026"

},

"HaierThermocoolChestFreezer.jpg":{

name:

"Haier Freezer",

id:

"HF001"

},

"AppleMacBookAirM4.jpg":{

name:

"Apple MacBook M4",

id:

"MAC004"

},

"RTXGamingLaptop.jpg":{

name:

"RTX Gaming Laptop",

id:

"RTX2026"

},

"dsw.jpg":{

name:

"Designer Smart Watch",

id:

"DSW001"

}

};

setTimeout(
load,
1000
);

async function load(){

let q=

query(

collection(
db,
"cart"
),

where(

"uid",

"==",

auth.currentUser.uid

)

);

let s=

await getDocs(q);

s.forEach(
d=>{

let x=
d.data();

let p=

auto[
x.image
];

list.innerHTML+=`

<div class="card">

<img src="${x.image}">

<div class="name">

${p.name}

</div>

<div class="id">

${p.id}

</div>

<button>

Copy Product ID

</button>

</div>

`;

});

}

</script>

</body>

</html>
