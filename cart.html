<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>

Cart

</title>

<style>

body{

background:#f3f3f3;

font-family:Arial;

padding:20px;

}

.title{

font-size:30px;

font-weight:bold;

margin-bottom:20px;

}

.card{

background:white;

padding:20px;

border-radius:20px;

margin-top:20px;

}

img{

width:100%;

height:220px;

object-fit:cover;

border-radius:15px;

}

.name{

font-size:24px;

font-weight:bold;

margin-top:15px;

}

.id{

font-size:20px;

font-weight:bold;

margin-top:15px;

color:#ff8800;

}

button{

width:100%;

padding:15px;

margin-top:15px;

border:none;

background:#ff8800;

color:white;

border-radius:12px;

font-size:18px;

}

.empty{

background:white;

padding:30px;

border-radius:20px;

text-align:center;

font-size:20px;

font-weight:bold;

}

</style>

</head>

<body>

<div class="title">

My Cart

</div>

<div id="list">

<div class="empty">

No Products Yet

</div>

</div>

<script type="module">

import {

initializeApp

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getFirestore,

collection,

query,

where,

getDocs

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

import {

getAuth

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

const firebaseConfig={

apiKey:

"AIzaSyBp3K3gJtK2XqIm-eVI1osP-Vma3wj1lTs",

authDomain:

"jumiastaff-83757.firebaseapp.com",

projectId:

"jumiastaff-83757"

};

const app=
initializeApp(firebaseConfig);

const db=
getFirestore(app);

const auth=
getAuth(app);

setTimeout(
load,
1000
);

async function load(){

if(!auth.currentUser){

return;

}

let q=

query(

collection(
db,
"cart"
),

where(

"uid",

"==",

auth.currentUser.uid

)

);

let s=

await getDocs(q);

list.innerHTML="";

if(s.empty){

list.innerHTML=

`<div class='empty'>

No Products Yet

</div>`;

}

s.forEach(
d=>{

let x=
d.data();

list.innerHTML+=`

<div class="card">

<img src="${x.image}">

<div class="name">

${x.productName}

</div>

<div class="id">

Product ID:

${x.productID}

</div>

<button
onclick="copyID(

'${x.productID}'

)">

Copy Product ID

</button>

</div>

`;

});

}

window.copyID=
(id)=>{

navigator.clipboard.writeText(
id
);

alert(
"Product ID Copied"
);

};

</script>

</body>

</html>
