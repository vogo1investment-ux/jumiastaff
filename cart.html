<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>

Cart

</title>

<style>

body{

background:#f3f3f3;

padding:20px;

font-family:Arial;

}

.card{

background:white;

padding:15px;

border-radius:20px;

margin-bottom:20px;

}

img{

width:100%;

border-radius:20px;

height:230px;

object-fit:cover;

}

</style>

</head>

<body>

<h2>

My Products

</h2>

<div id="cart">

</div>

<script type="module">

import products from "./products.js";

import {

initializeApp

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getAuth,

onAuthStateChanged

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

import {

getFirestore,

doc,

getDoc

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig={

apiKey:
"AIzaSyBp3K3gJtK2XqIm-eVI1osP-Vma3wj1lTs",

authDomain:
"jumiastaff-83757.firebaseapp.com",

projectId:
"jumiastaff-83757"

};

const app=

initializeApp(firebaseConfig);

const auth=

getAuth(app);

const db=

getFirestore(app);

onAuthStateChanged(

auth,

async(user)=>{

if(!user)return;

let snap=

await getDoc(

doc(
db,
"users",
user.uid
)

);

let d=
snap.data();

cart.innerHTML="";

(

d.cart||[]

)

.forEach(

x=>{

let p=

products[
x.productId
];

if(!p)return;

cart.innerHTML+=`

<div class="card">

<img src="${
p.img
}">

</div>

`;

}

);

}

);

</script>

</body>

</html>
