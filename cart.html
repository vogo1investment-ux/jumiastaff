<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cart</title>

<style>
body{
margin:0;
background:#f3f3f3;
font-family:Arial;
padding:15px;
}

.title{
font-size:28px;
font-weight:bold;
margin-bottom:20px;
}

.card{
background:white;
border-radius:15px;
overflow:hidden;
margin-bottom:20px;
box-shadow:0 5px 10px rgba(0,0,0,.1);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.info{
padding:15px;
}

.name{
font-size:20px;
font-weight:bold;
}

.pid{
margin-top:10px;
font-size:16px;
color:red;
font-weight:bold;
}

.copy{
margin-top:15px;
background:#ff9900;
border:none;
width:100%;
padding:12px;
color:white;
font-size:18px;
border-radius:10px;
}

.empty{
text-align:center;
margin-top:100px;
font-size:20px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="title">
🛒 My Cart
</div>

<div id="cart"></div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"YOURKEY",
authDomain:"YOURDOMAIN",
projectId:"jumiastaff-83757"
};

const app=initializeApp(firebaseConfig);

const db=getFirestore(app);

async function loadCart(){

let box=document.getElementById("cart");

box.innerHTML="";

const snap=await getDocs(
collection(
db,
"cart"
)
);

if(snap.empty){

box.innerHTML=
"<div class='empty'>No Products Yet</div>";

return;

}

snap.forEach(doc=>{

let d=doc.data();

box.innerHTML+=`

<div class="card">

<img src="${d.image}">

<div class="info">

<div class="name">

${d.name}

</div>

<div class="pid">

Product ID:
${d.productID}

</div>

<button class="copy"
onclick="
navigator.clipboard.writeText(
'${d.productID}'
);
alert('Copied');
">

Copy Product ID

</button>

</div>

</div>

`;

});

}

loadCart();

</script>

</body>
</html>
