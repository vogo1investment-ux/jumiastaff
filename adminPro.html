<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>

ADMIN PANEL

</title>

<style>

body{
background:#f3f3f3;
font-family:Arial;
padding:20px;
}

.top{
background:#ff6600;
color:white;
padding:20px;
border-radius:20px;
font-weight:bold;
margin-bottom:20px;
}

.card{
background:white;
padding:20px;
border-radius:20px;
margin-bottom:15px;
font-weight:bold;
}

input{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:8px;
font-weight:bold;
}

button{
width:100%;
padding:15px;
background:#ff6600;
color:white;
border:none;
margin-top:10px;
font-weight:bold;
}

#chatBox{
height:350px;
overflow:auto;
border:1px solid black;
padding:10px;
background:white;
}

.msg{

padding:10px;

margin-top:8px;

background:#eee;

border-radius:10px;

}

</style>

</head>

<body>

<div class="top">

ADMIN PANEL

</div>

<div id="users">

</div>

<div class="card">

CHAT USER UID

<input
id="chatUser"
placeholder="Paste User UID">

<div id="chatBox">

</div>

<input
id="adminMsg"
placeholder="Reply">

<button id="sendAdmin">

SEND MESSAGE

</button>

</div>

<script type="module">

import {

initializeApp

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getFirestore,

collection,

getDocs,

doc,

updateDoc,

query,

where,

onSnapshot,

addDoc,

orderBy

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const app=

initializeApp({

apiKey:

"AIzaSyBp3K3gJtK2XqIm-eVI1osP-Vma3wj1lTs",

authDomain:

"jumiastaff-83757.firebaseapp.com",

projectId:

"jumiastaff-83757"

});

const db=

getFirestore(app);

let snap=

await getDocs(

collection(

db,

"users"

)

);

snap.forEach(

u=>{

let d=u.data();

users.innerHTML+=`

<div class="card">

USER ID

<br>

${u.id}

<br><br>

USERNAME

<input id="u${u.id}"

value="${d.username||""}">

AVAILABLE

<input id="a${u.id}"

value="${d.availableBalance||0}">

WITHDRAWABLE

<input id="w${u.id}"

value="${d.withdrawableBalance||0}">

REFERRAL

<input id="r${u.id}"

value="${d.referralCommission||0}">

<button onclick="saveUser('${u.id}')">

SAVE

</button>

</div>

`;

}

);

window.saveUser=

async(id)=>{

await updateDoc(

doc(

db,

"users",

id

),

{

username:

document.getElementById(

"u"+id

).value,

availableBalance:

Number(

document.getElementById(

"a"+id

).value

),

withdrawableBalance:

Number(

document.getElementById(

"w"+id

).value

),

referralCommission:

Number(

document.getElementById(

"r"+id

).value

)

}

);

alert(

"UPDATED"

);

};

chatUser.oninput=()=>{

loadChat(

chatUser.value

);

};

function loadChat(uid){

const q=

query(

collection(

db,

"chatMessages"

),

where(

"userId",

"==",

uid

)

);

onSnapshot(

q,

snap=>{

chatBox.innerHTML="";

snap.forEach(

x=>{

let d=x.data();

chatBox.innerHTML+=`

<div class="msg">

<b>

${d.sender}

</b>

<br><br>

${d.message}

</div>

`;

}

);

chatBox.scrollTop=

chatBox.scrollHeight;

}

);

}

sendAdmin.onclick=

async()=>{

if(

adminMsg.value==""

)return;

await addDoc(

collection(

db,

"chatMessages"

),

{

userId:

chatUser.value,

sender:

"ADMIN",

message:

adminMsg.value,

time:

Date.now()

}

);

adminMsg.value="";

};

</script>

</body>

</html>
