<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
content="width=device-width,initial-scale=1">

<style>

body{

font-family:Arial;

background:#f3f3f3;

padding:20px;

}

.card{

background:white;

padding:20px;

margin-bottom:15px;

border-radius:20px;

}

input{

width:100%;

padding:12px;

margin-top:8px;

margin-bottom:8px;

}

button{

width:100%;

padding:12px;

background:#ff6600;

border:none;

color:white;

}

</style>

</head>

<body>

<h2>

ADMIN PRO

</h2>

<div id="users">

</div>

<script type="module">

import {

initializeApp

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getFirestore,

collection,

getDocs,

doc,

updateDoc

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig={

apiKey:"AIzaSyBp3K3gJtK2XqIm-eVI1osP-Vma3wj1lTs",

authDomain:
"jumiastaff-83757.firebaseapp.com",

projectId:
"jumiastaff-83757"

};

const app=

initializeApp(

firebaseConfig

);

const db=

getFirestore(

app

);

let s=

await getDocs(

collection(

db,

"users"

)

);

s.forEach(

u=>{

let d=u.data();

users.innerHTML+=`

<div class="card">

UID:
${u.id}

<input
id="u${u.id}"
value="${d.username||""}">

<input
id="a${u.id}"
value="${d.availableBalance||0}">

<input
id="w${u.id}"
value="${d.withdrawableBalance||0}">

<input
id="r${u.id}"
value="${d.referralCommission||0}">

<input
id="ur${u.id}"
value="${d.usedReferral||""}">

<input
id="j${u.id}"
value="${d.joinedUsers||0}">

<input
id="c${u.id}"
value="${
(d.cart||[]).join(",")
}">

<button
onclick="saveUser('${u.id}')">

SAVE USER

</button>

</div>

`;

}

);

window.saveUser=

async(id)=>{

await updateDoc(

doc(

db,

"users",

id

),

{

username:

document.getElementById(

"u"+id

).value,

availableBalance:

Number(

document.getElementById(

"a"+id

).value

),

withdrawableBalance:

Number(

document.getElementById(

"w"+id

).value

),

referralCommission:

Number(

document.getElementById(

"r"+id

).value

),

usedReferral:

document.getElementById(

"ur"+id

).value,

joinedUsers:

Number(

document.getElementById(

"j"+id

).value

),

cart:

document.getElementById(

"c"+id

).value.split(",")

}

);

alert(

"Updated"

);

};

</script>

</body>

</html>
