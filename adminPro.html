<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>

ADMIN PANEL

</title>

<style>

body{
background:#f3f3f3;
font-family:Arial;
padding:20px;
}

.top{
background:#ff6600;
color:white;
padding:20px;
border-radius:20px;
font-weight:bold;
margin-bottom:20px;
}

.card{
background:white;
padding:20px;
border-radius:20px;
margin-bottom:15px;
font-weight:bold;
}

input{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:8px;
font-weight:bold;
}

button{
width:100%;
padding:15px;
background:#ff6600;
color:white;
border:none;
margin-top:10px;
font-weight:bold;
}

#chatBox{
height:300px;
overflow:auto;
border:1px solid black;
padding:10px;
}

</style>

</head>

<body>

<div class="top">

ADMIN PANEL

</div>

<div id="users">

</div>

<div class="card">

USER UID

<input id="chatUser">

<div id="chatBox">

</div>

<input
id="adminMsg">

<button id="sendAdmin">

SEND

</button>

</div>

<script type="module">

import {
initializeApp
}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
doc,
updateDoc,
query,
where,
onSnapshot,
addDoc
}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const app=

initializeApp({

apiKey:"AIzaSyBp3K3gJtK2XqIm-eVI1osP-Vma3wj1lTs",

authDomain:"jumiastaff-83757.firebaseapp.com",

projectId:"jumiastaff-83757"

});

const db=

getFirestore(app);

let snap=

await getDocs(

collection(

db,

"users"

)

);

snap.forEach(

u=>{

let d=u.data();

users.innerHTML+=`

<div class="card">

<b>

USER ID:

${u.id}

</b>

<br><br>

USERNAME

<input id="u${u.id}" value="${d.username||""}">

AVAILABLE

<input id="a${u.id}" value="${d.availableBalance||0}">

WITHDRAWABLE

<input id="w${u.id}" value="${d.withdrawableBalance||0}">

REFERRAL

<input id="r${u.id}" value="${d.referralCommission||0}">

USED REF

<input id="ur${u.id}" value="${d.usedReferral||""}">

CART

<input id="c${u.id}" value="${(d.cart||[]).join(",")}">

<button onclick="saveUser('${u.id}')">

SAVE

</button>

</div>

`;

}

);

</script>

</body>

</html>
