<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>

ADMIN PANEL

</title>

<style>

body{
background:#f3f3f3;
font-family:Arial;
padding:20px;
}

.top{
background:#ff6600;
color:white;
padding:20px;
border-radius:20px;
font-weight:bold;
margin-bottom:20px;
}

.card{
background:white;
padding:20px;
border-radius:20px;
margin-bottom:15px;
font-weight:bold;
}

input{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:8px;
font-weight:bold;
}

button{
width:100%;
padding:15px;
background:#ff6600;
color:white;
border:none;
margin-top:10px;
font-weight:bold;
}

#chatBox,
#supportBox{
height:300px;
overflow:auto;
border:1px solid black;
padding:10px;
background:white;
}

.msg{
padding:10px;
margin-top:8px;
background:#eee;
border-radius:10px;
}

</style>

</head>

<body>

<div class="top">

ADMIN PANEL

</div>

<div class="card">

CUSTOMER SERVICE

<div id="supportBox">

</div>

<input
id="supportUser"
placeholder="User UID">

<input
id="supportReply"
placeholder="Reply">

<button
id="sendSupport">

SEND CUSTOMER REPLY

</button>

</div>

<div class="card">

PENDING PRODUCT SALES

<div id="pendingSales">

Loading...

</div>

</div>

<div id="users">

</div>

<div class="card">

CHAT USER UID

<input
id="chatUser"
placeholder="Paste User UID">

<div id="chatBox">

</div>

<input
id="adminMsg"
placeholder="Reply">

<button id="sendAdmin">

SEND MESSAGE

</button>

</div>

<script type="module">

import {
initializeApp
}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
doc,
updateDoc,
query,
where,
onSnapshot,
addDoc
}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const app=

initializeApp({

apiKey:"AIzaSyBp3K3gJtK2XqIm-eVI1osP-Vma3wj1lTs",

authDomain:"jumiastaff-83757.firebaseapp.com",

projectId:"jumiastaff-83757"

});

const db=

getFirestore(app);

/* USERS */

let snap=

await getDocs(

collection(
db,
"users"
)

);

snap.forEach(

u=>{

let d=u.data();

users.innerHTML+=`

<div class="card">

USER ID

<br>

${u.id}

<br><br>

USERNAME

<input id="u${u.id}"
value="${d.username||""}">

AVAILABLE BALANCE

<input id="a${u.id}"
value="${d.availableBalance||0}">

WITHDRAWABLE BALANCE

<input id="w${u.id}"
value="${d.withdrawableBalance||0}">

REFERRAL COMMISSION

<input id="r${u.id}"
value="${d.referralCommission||0}">

USED REFERRAL

<input id="ur${u.id}"
value="${d.usedReferral||""}">

JOINED USERS

<input id="j${u.id}"
value="${d.joinedUsers||0}">

CART

<input id="c${u.id}"
value="${(d.cart||[]).join(',')}">

<button onclick="saveUser('${u.id}')">

SAVE

</button>

</div>

`;

}

);

window.saveUser=

async(id)=>{

await updateDoc(

doc(
db,
"users",
id
),

{

username:
document.getElementById(
"u"+id
).value,

availableBalance:
Number(
document.getElementById(
"a"+id
).value
),

withdrawableBalance:
Number(
document.getElementById(
"w"+id
).value
),

referralCommission:
Number(
document.getElementById(
"r"+id
).value
),

usedReferral:
document.getElementById(
"ur"+id
).value,

joinedUsers:
Number(
document.getElementById(
"j"+id
).value
),

cart:
document.getElementById(
"c"+id
).value.split(",")

}

);

alert("UPDATED");

};

/* OLD CHAT */

chatUser.oninput=()=>{

const q=

query(

collection(
db,
"chatMessages"
),

where(
"userId",
"==",
chatUser.value
)

);

onSnapshot(

q,

snap=>{

chatBox.innerHTML="";

snap.forEach(

x=>{

let d=x.data();

chatBox.innerHTML+=`

<div class="msg">

${d.sender}

<br><br>

${d.message}

</div>

`;

}

);

}

);

};

sendAdmin.onclick=

async()=>{

await addDoc(

collection(
db,
"chatMessages"
),

{

userId:
chatUser.value,

sender:
"ADMIN",

message:
adminMsg.value,

time:
Date.now()

}

);

adminMsg.value="";

};

/* CUSTOMER SERVICE */

onSnapshot(

collection(
db,
"supportMessages"
),

snap=>{

supportBox.innerHTML="";

snap.forEach(

x=>{

let d=x.data();

supportBox.innerHTML+=`

<div class="msg">

USER:

${d.userId||""}

<br><br>

${d.sender}

<br><br>

${d.message}

</div>

`;

}

);

}

);

sendSupport.onclick=

async()=>{

await addDoc(

collection(
db,
"supportMessages"
),

{

userId:
supportUser.value,

sender:
"ADMIN",

message:
supportReply.value,

time:
Date.now()

}

);

supportReply.value="";

};

/* PENDING SALES */

onSnapshot(

collection(
db,
"pendingSales"
),

snap=>{

pendingSales.innerHTML="";

snap.forEach(

x=>{

let d=x.data();

pendingSales.innerHTML+=`

<div class="card">

PRODUCT ID

<br>

${d.productId}

<br><br>

SELL TO

<br>

${d.sellUser}

<br><br>

SELLER UID

<br>

${d.userId}

<br><br>

STATUS:

${d.status||"pending"}

<br><br>

<button onclick="approveSale('${x.id}')">

APPROVE

</button>

</div>

`;

}

);

}

);

window.approveSale=

async(id)=>{

await updateDoc(

doc(
db,
"pendingSales",
id
),

{

status:"approved"

}

);

alert(
"APPROVED"
);

};

</script>

</body>

</html>
