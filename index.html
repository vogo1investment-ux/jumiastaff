<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>

JUMIASTAFF

</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f3f3f3;
padding-bottom:100px;
}

.top{
background:white;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
border-radius:0 0 20px 20px;
box-shadow:0 5px 10px rgba(0,0,0,.1);
position:sticky;
top:0;
z-index:100;
}

.logo{
display:flex;
gap:10px;
align-items:center;
font-size:22px;
font-weight:bold;
}

.star{
width:45px;
height:45px;
background:#ff9900;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:22px;
color:white;
}

.icons{
display:flex;
gap:20px;
font-size:28px;
}

.menu{
display:grid;
grid-template-columns:repeat(4,1fr);
padding:20px;
gap:15px;
}

.box{
background:white;
padding:15px;
border-radius:20px;
text-align:center;
animation:float 3s infinite;
}

.icon{
font-size:35px;
color:#ff9900;
}

@keyframes float{

50%{

transform:translateY(-6px);

}

}

.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:15px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.info{
padding:15px;
}

.name{
font-size:18px;
height:55px;
overflow:hidden;
}

.price{
margin-top:15px;
font-size:22px;
font-weight:bold;
color:#ff5500;
}

.rate{
color:#00aa44;
margin-top:8px;
font-size:14px;
}

.bottom{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
display:flex;
justify-content:space-around;
padding:15px;
box-shadow:0 -5px 10px rgba(0,0,0,.1);
}

.nav{
text-align:center;
font-size:15px;
cursor:pointer;
}

.active{
color:red;
}

</style>

</head>

<body>

<div class="top">

<div class="logo">

<div class="star">

⭐

</div>

JUMIASTAFF

</div>

<div class="icons">

🔔 🌍

</div>

</div>

<div class="menu">

<div class="box">

<div class="icon">

💎

</div>

Merchant

</div>

<div class="box">

<div class="icon">

🖥

</div>

Server

</div>

<div class="box">

<div class="icon">

❓

</div>

Help

</div>

<div class="box">

<div class="icon">

⭐

</div>

About

</div>

</div>

<div class="products">

<!-- keep all your product cards here unchanged -->

</div>

<div class="bottom">

<div class="nav active"
onclick="goHome()">

🏠

<br>

Home

</div>

<div class="nav"
onclick="goOrders()">

⬜

<br>

Orders

</div>

<div class="nav"
onclick="goCart()">

🛒

<br>

Cart

</div>

<div class="nav"
onclick="goMine()">

👤

<br>

Mine

</div>

</div>

<script type="module">

import {

initializeApp

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getAuth,

onAuthStateChanged

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

const firebaseConfig={

apiKey:"AIzaSyBp3K3gJtK2XqIm-eVI1osP-Vma3wj1lTs",

authDomain:
"jumiastaff-83757.firebaseapp.com",

projectId:
"jumiastaff-83757",

storageBucket:
"jumiastaff-83757.firebasestorage.app",

messagingSenderId:
"1018307795636",

appId:
"1:1018307795636:web:6e2dc2cbf41cb88e1ad5e1"

};

const app=

initializeApp(firebaseConfig);

const auth=

getAuth(app);

async function checkCountry(){

try{

let r=

await fetch(

"https://ipapi.co/json/"

);

let d=

await r.json();

let country=

d.country_code;

let tz=

Intl.DateTimeFormat()

.resolvedOptions()

.timeZone;

if(

country==="NG"

||

tz==="Africa/Lagos"

){

document.body.innerHTML=

`

<div style='

height:100vh;

display:flex;

justify-content:center;

align-items:center;

font-size:32px;

font-weight:bold;

background:white;

text-align:center;

padding:20px;

'>

NOT AVAILABLE IN YOUR COUNTRY

</div>

`;

return;

}

}catch(e){

console.log(e);

}

}

checkCountry();

window.goHome=()=>{

location="index.html";

};

window.goOrders=()=>{

location="orders.html";

};

window.goCart=()=>{

location="cart.html";

};

window.goMine=()=>{

onAuthStateChanged(

auth,

(user)=>{

if(user){

location="mine.html";

}

else{

location="auth.html";

}

}

);

};

</script>

</body>

</html>
