*{

padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f3f3f3;
padding-bottom:100px;
}

.top{
background:white;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
border-radius:0 0 20px 20px;
box-shadow:0 5px 10px rgba(0,0,0,.1);
position:sticky;
top:0;
z-index:100;
}

.logo{
display:flex;
gap:10px;
align-items:center;
font-size:22px;
font-weight:bold;
}

.star{
width:45px;
height:45px;
background:#ff9900;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:22px;
color:white;
}

.icons{
display:flex;
gap:20px;
font-size:28px;
}

.menu{
display:grid;
grid-template-columns:repeat(4,1fr);
padding:20px;
gap:15px;
}

.box{
background:white;
padding:15px;
border-radius:20px;
text-align:center;
}

.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:15px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.bottom{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
display:flex;
justify-content:space-around;
padding:15px;
}

#advertPopup{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,.8);
display:flex;
justify-content:center;
align-items:center;
z-index:99999;
}

.advertBox{
background:white;
padding:15px;
border-radius:20px;
width:90%;
max-width:420px;
position:relative;
}

.advertBox video{
width:100%;
border-radius:15px;
}

#closeAdvert{
display:none;
position:absolute;
top:10px;
right:10px;
border:none;
background:red;
color:white;
padding:8px;
border-radius:50%;
}

</style>
