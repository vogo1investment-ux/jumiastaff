<!DOCTYPE html>
<html>

<head>

<meta name="viewport"

content="width=device-width,initial-scale=1">

<style>

body{

background:#f5f5f5;

font-family:Arial;

padding:30px;

}

.box{

margin-top:140px;

}

input{

width:100%;

padding:18px;

margin-top:15px;

border-radius:40px;

border:2px solid #eee;

}

button{

width:100%;

padding:18px;

margin-top:20px;

border:none;

border-radius:40px;

background:

linear-gradient(
90deg,
#ff7755,
red
);

color:white;

font-size:20px;

}

p{

text-align:center;

margin-top:30px;

}

a{

color:black;

}

</style>

</head>

<body>

<div class="box">

<input

id="email"

placeholder=

"Email">

<input

id="password"

type="password"

placeholder=

"Password">

<button

onclick="login()">

Login

</button>

<p>

No Account?

<a href=

"signup.html">

Register Now

</a>

</p>

</div>

<script type="module">

import {

auth

}

from "./firebase.js";

import {

signInWithEmailAndPassword

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

window.login=

async()=>{

await

signInWithEmailAndPassword(

auth,

email.value,

password.value

);

location=

"home.html";

}

</script>

</body>

</html>
